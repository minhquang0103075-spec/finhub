<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FinHub — Cộng đồng</title>
<link rel="stylesheet" href="/css/style.css?v=4">
</head>
<body>
<div id="site-header"></div>
<main class="wrap" id="c" style="padding-bottom:60px"><p class="muted" style="padding:30px 0">Đang tải…</p></main>
<div id="site-footer"></div>

<script src="/js/app.js?v=4"></script>
<script>
const TID = new URLSearchParams(location.search).get('id');

async function load(){
  await initChrome('nav_community');
  if(TID) return renderThread();
  renderList();
}

async function renderList(){
  const c = document.getElementById('c');
  const { threads } = await api('/api/threads');
  const rows = threads.map(t0=>`
    <div class="thread-row">
      <div>
        <a href="/community.html?id=${t0.id}"><h3>${esc(t0.title)}</h3></a>
        <div class="meta">${t('by')} ${esc(t0.author)} · ${fmtDate(t0.lastActivity)}</div>
      </div>
      <div class="replies-badge"><b>${t0.replies}</b>${t('replies')}</div>
    </div>`).join('') || `<p class="muted">—</p>`;

  const newForm = ME ? `
    <div style="border:1px solid var(--line);padding:22px;margin-bottom:26px">
      <h3 style="margin:0 0 14px;font-family:var(--sans);font-size:14px;text-transform:uppercase;letter-spacing:.05em">${t('new_thread')}</h3>
      <div class="field"><label>${t('thread_title')}</label><input type="text" id="ntitle"></div>
      <div class="field"><label>${t('thread_body')}</label><textarea id="nbody"></textarea></div>
      <button class="btn red" onclick="createThread()">${t('create')}</button>
      <div id="nmsg"></div>
    </div>` :
    `<p class="notice" style="background:var(--ecru)">${t('login_to_comment')} <a href="/login.html" style="color:var(--red)">${t('signin')}</a></p>`;

  c.innerHTML = `
    <div style="padding:26px 0 10px">
      <h1 style="font-size:34px;margin:0">${t('community_title')}</h1>
      <p class="muted" style="font-style:italic">${t('community_sub')}</p>
    </div>
    ${newForm}
    ${rows}`;
}

async function createThread(){
  const title = document.getElementById('ntitle').value.trim();
  const body = document.getElementById('nbody').value.trim();
  if(!title){ return; }
  try {
    const { thread } = await api('/api/threads',{method:'POST',body:{title,body}});
    location.href = '/community.html?id='+thread.id;
  } catch(e){ document.getElementById('nmsg').innerHTML=`<p class="notice err">${e.message}</p>`; }
}

async function renderThread(){
  const c = document.getElementById('c');
  const { thread, posts } = await api('/api/threads/'+TID);
  const list = posts.map(p=>`
    <div class="comment">
      <span class="who">${esc(p.author)}</span><span class="when">${fmtDate(p.createdAt)}</span>
      <p>${esc(p.body)}</p>
    </div>`).join('') || `<p class="muted">—</p>`;

  const replyForm = ME ? `
    <div class="field" style="margin-top:18px"><textarea id="rbody" placeholder="${t('write_comment')}"></textarea></div>
    <button class="btn red" onclick="addReply()">${t('reply')}</button><div id="rmsg"></div>` :
    `<p class="muted">${t('login_to_comment')} <a href="/login.html" style="color:var(--red)">${t('signin')}</a></p>`;

  c.innerHTML = `
    <div class="comments" style="padding-top:24px">
      <a href="/community.html" class="byline">${t('back')}</a>
      <h1 style="font-size:30px;margin:10px 0 4px">${esc(thread.title)}</h1>
      <div class="byline" style="margin-bottom:16px">${t('by')} ${esc(thread.author)} · ${fmtDate(thread.createdAt)}</div>
      ${thread.body?`<p style="font-size:17px">${esc(thread.body)}</p>`:''}
      <h3 style="margin-top:26px">${posts.length} ${t('replies')}</h3>
      ${list}
      ${replyForm}
    </div>`;
}

async function addReply(){
  const body = document.getElementById('rbody').value.trim();
  if(!body) return;
  try { await api('/api/threads/'+TID+'/posts',{method:'POST',body:{body}}); renderThread(); }
  catch(e){ document.getElementById('rmsg').innerHTML=`<p class="notice err">${e.message}</p>`; }
}
load();
</script>
</body>
</html>
